<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Faire un don - Les Ouvriers 974</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="page-don">

<h1>💚 Finaliser votre don</h1>

<form id="form-don">

  <label>Nom :</label>
  <input type="text" id="nom" required>

  <label>Email :</label>
  <input type="email" id="email" required>

  <label>Montant (€) :</label>
  <input type="number" id="montant" required>

  <button type="submit" class="btn">Valider</button>

</form>

<p id="message"></p>

<!-- 🔥 SCRIPT DON (MODULE OBLIGATOIRE) -->
<script type="module" src="don-form.js"></script>

</body>
</html>
