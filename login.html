<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Admin</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2e7d32, #66bb6a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD LOGIN */
.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h1 {
    margin-bottom: 20px;
    color: #2e7d32;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1b5e20;
}

/* MESSAGE */
#error {
    color: red;
    margin-top: 10px;
    display: none;
}
</style>
</head>
<script src="login.js"></script>
<body>

<div class="login-box">
    <h1>🔐 Admin</h1>

    <input type="text" id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">

    <button onclick="login()">Se connecter</button>

    <p id="error">Identifiants incorrects</p>
</div>
<script>
function login() {

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "974") {

        // stocke la session
        localStorage.setItem("adminConnecte", "true");

        console.log("Connecté :", localStorage.getItem("adminConnecte"));

        // redirection
        window.location.href = "admin.html";

    } else {
        document.getElementById("error").style.display = "block";
    }
}
<script type="module" src="firebase.js"></script>
</script>
</body>
</html>
